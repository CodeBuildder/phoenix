server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use kube-dns for upstream resolution at request time (not startup)
    resolver 10.43.0.10 valid=30s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/graph/ {
        set $graph phoenix-graph.phoenix-system.svc.cluster.local;
        rewrite ^/api/graph/(.*)$ /$1 break;
        proxy_pass http://$graph:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/chaos/ {
        set $chaos phoenix-chaos.phoenix-system.svc.cluster.local;
        rewrite ^/api/chaos/(.*)$ /$1 break;
        proxy_pass http://$chaos:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/faultlib/ {
        set $faultlib phoenix-faultlib.phoenix-system.svc.cluster.local;
        rewrite ^/api/faultlib/(.*)$ /$1 break;
        proxy_pass http://$faultlib:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/sim/ {
        set $sim phoenix-sim.phoenix-system.svc.cluster.local;
        rewrite ^/api/sim/(.*)$ /$1 break;
        proxy_pass http://$sim:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/agent/ {
        set $agent phoenix-agent.phoenix-system.svc.cluster.local;
        rewrite ^/api/agent/(.*)$ /$1 break;
        proxy_pass http://$agent:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
