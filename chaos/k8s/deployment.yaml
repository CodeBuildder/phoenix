apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-chaos
  namespace: phoenix-system
  labels:
    app: phoenix-chaos
    app.kubernetes.io/managed-by: phoenix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phoenix-chaos
  template:
    metadata:
      labels:
        app: phoenix-chaos
    spec:
      serviceAccountName: phoenix-chaos
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: phoenix-chaos
          image: docker.io/library/phoenix-chaos:latest
          imagePullPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
            - name: SIMULATOR_URL
              value: "http://phoenix-sim.phoenix-system.svc.cluster.local"
            - name: SWEEP_INTERVAL_SECONDS
              value: "5.0"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
