apiVersion: v1
kind: ServiceAccount
metadata:
  name: phoenix-graph
  namespace: phoenix-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: phoenix-graph
rules:
  - apiGroups: [""]
    resources: ["services", "pods", "namespaces", "endpoints"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: phoenix-graph
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: phoenix-graph
subjects:
  - kind: ServiceAccount
    name: phoenix-graph
    namespace: phoenix-system
