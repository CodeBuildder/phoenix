apiVersion: v1
kind: ServiceAccount
metadata:
  name: phoenix-agent
  namespace: phoenix-system
  labels:
    app: phoenix-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: phoenix-agent
rules:
  # Read deployments/pods to understand current state
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # Scale deployments
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: phoenix-agent
subjects:
  - kind: ServiceAccount
    name: phoenix-agent
    namespace: phoenix-system
roleRef:
  kind: ClusterRole
  name: phoenix-agent
  apiGroup: rbac.authorization.k8s.io
